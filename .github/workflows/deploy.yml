name: Deploy via FTP

on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparar manualmente na aba Actions também

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Node 24 vira padrão das actions em 16/06/2026; opt-in antecipado
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # versão vem do "packageManager" no package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build static site (pt/en/es)
        run: pnpm build # next build + export -> ./out

      - name: Deploy SFTP
        # O FTPS da HostGator é instável (SSL alert 50 no socket de dados);
        # SFTP (SSH) é criptografado e estável.
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }} # ou troque por ssh_private_key
          port: 2222 # HostGator shared usa 2222 (não 22)
          local_path: "./out/*"
          # Caminho relativo à home do login SSH (mesma lógica do FTP).
          remote_path: "./public_html/casasboutiquepatacho.com.br"
          sftp_only: "true"
